<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI導入事例集 | ChatGPT・Claude・Gemini × 開発 & マーケティング</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f9fa;
  --surface: #ffffff;
  --surface-hover: #f1f3f5;
  --border: #e5e7eb;
  --border-light: #f0f0f0;
  --text: #1a1a2e;
  --text-secondary: #374151;
  --text-muted: #6b7280;
  --chatgpt: #10a37f;
  --claude: #d97706;
  --gemini: #4285f4;
  --chatgpt-bg: rgba(16,163,127,.07);
  --claude-bg: rgba(217,119,6,.07);
  --gemini-bg: rgba(66,133,244,.07);
  --tag-dev: #7c3aed;
  --tag-mkt: #e11d48;
  --tag-solo: #0891b2;
  --tag-dev-bg: rgba(124,58,237,.08);
  --tag-mkt-bg: rgba(225,29,72,.08);
  --tag-solo-bg: rgba(8,145,178,.08);
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh;}

/* Header */
.site-header{padding:40px 24px 0;max-width:960px;margin:0 auto;}
.site-header h1{font-size:clamp(1.4rem,3vw,1.8rem);font-weight:800;letter-spacing:-.02em;color:var(--text);}
.site-header p{color:var(--text-muted);font-size:.95rem;margin-top:4px;}
.header-stats{display:flex;gap:24px;margin-top:16px;flex-wrap:wrap;}
.header-stats span{font-size:.85rem;color:var(--text-muted);}
.header-stats strong{color:var(--text);font-weight:700;}

/* Filters */
.filters{max-width:960px;margin:24px auto 0;padding:0 24px;}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.filter-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;}
.filter-btn:hover{border-color:#bbb;}
.filter-btn.active{color:#fff;border-color:transparent;}
.filter-btn.active[data-provider="chatgpt"]{background:var(--chatgpt);}
.filter-btn.active[data-provider="claude"]{background:var(--claude);}
.filter-btn.active[data-provider="gemini"]{background:var(--gemini);}
.filter-btn.active[data-genre="dev"]{background:var(--tag-dev);}
.filter-btn.active[data-genre="mkt"]{background:var(--tag-mkt);}
.filter-btn.active[data-scale="solo"]{background:var(--tag-solo);}
.filter-btn.active[data-filter="all"]{background:var(--text);color:#fff;}
.filter-label{font-size:.75rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:6px 4px;display:flex;align-items:center;}

/* Section */
.section{max-width:960px;margin:32px auto 0;padding:0 24px;}
.section:last-of-type{padding-bottom:64px;}
.section-title{font-size:1.1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.section-title .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
.section-title .count{font-size:.8rem;color:var(--text-muted);font-weight:500;}

/* Accordion Items */
.accordion-list{display:flex;flex-direction:column;gap:6px;}
.acc-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:box-shadow .2s;}
.acc-item:hover{box-shadow:var(--shadow);}
.acc-item.open{box-shadow:var(--shadow-md);}
.acc-item[data-hidden="true"]{display:none;}

.acc-header{padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:12px;user-select:none;}
.acc-header:hover{background:var(--surface-hover);}
.acc-company{font-weight:700;font-size:.95rem;flex-shrink:0;}
.acc-company .flag{margin-left:2px;}
.acc-separator{color:var(--border);flex-shrink:0;}
.acc-tool{font-size:.82rem;color:var(--text-muted);flex-shrink:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.acc-tags{display:flex;gap:4px;flex-shrink:0;margin-left:auto;}
.acc-tag{padding:2px 10px;border-radius:12px;font-size:.7rem;font-weight:600;letter-spacing:.02em;}
.acc-tag.dev{background:var(--tag-dev-bg);color:var(--tag-dev);}
.acc-tag.mkt{background:var(--tag-mkt-bg);color:var(--tag-mkt);}
.acc-tag.solo{background:var(--tag-solo-bg);color:var(--tag-solo);}
.acc-highlight{font-size:.82rem;font-weight:700;color:var(--text);flex-shrink:0;white-space:nowrap;}
.acc-chevron{flex-shrink:0;width:20px;height:20px;display:flex;align-items:center;justify-content:center;transition:transform .2s;color:var(--text-muted);}
.acc-item.open .acc-chevron{transform:rotate(180deg);}

.acc-body{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1);}
.acc-body-inner{padding:0 20px 20px;border-top:1px solid var(--border-light);margin-top:0;}
.acc-body-inner > *:first-child{margin-top:16px;}

.detail-block{margin-bottom:16px;}
.detail-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:4px;}
.detail-text{font-size:.88rem;color:var(--text-secondary);line-height:1.75;}
.detail-list{list-style:none;padding:0;}
.detail-list li{font-size:.88rem;color:var(--text-secondary);padding:3px 0;padding-left:18px;position:relative;}
.detail-list li::before{content:"";position:absolute;left:0;top:12px;width:6px;height:6px;border-radius:50%;}
.acc-item[data-provider="chatgpt"] .detail-list li::before{background:var(--chatgpt);}
.acc-item[data-provider="claude"] .detail-list li::before{background:var(--claude);}
.acc-item[data-provider="gemini"] .detail-list li::before{background:var(--gemini);}
.detail-link{display:inline-flex;align-items:center;gap:4px;font-size:.82rem;color:var(--text-muted);text-decoration:none;border-bottom:1px dashed var(--border);padding-bottom:1px;transition:color .15s;}
.detail-link:hover{color:var(--text);}

/* Provider accent bar */
.acc-item[data-provider="chatgpt"]{border-left:3px solid var(--chatgpt);}
.acc-item[data-provider="claude"]{border-left:3px solid var(--claude);}
.acc-item[data-provider="gemini"]{border-left:3px solid var(--gemini);}

/* Tab navigation */
.tab-nav{max-width:960px;margin:0 auto;padding:40px 24px 0;display:flex;gap:0;border-bottom:2px solid var(--border);}
.tab-btn{padding:12px 24px;font-size:.95rem;font-weight:600;color:var(--text-muted);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* Influencer section */
.inf-platform-title{max-width:960px;margin:32px auto 16px;padding:0 24px;font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:10px;}
.inf-platform-title .platform-icon{width:24px;height:24px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;color:#fff;}
.inf-platform-title .platform-icon.yt{background:#FF0000;}
.inf-platform-title .platform-icon.ig{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);}
.inf-platform-title .platform-icon.th{background:#000;}
.inf-platform-title .count{font-size:.8rem;color:var(--text-muted);font-weight:500;}
.inf-grid{max-width:960px;margin:0 auto;padding:0 24px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.inf-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:box-shadow .2s;}
.inf-card:hover{box-shadow:var(--shadow-md);}
.inf-card-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.inf-card-name{font-weight:700;font-size:.92rem;}
.inf-card-name .flag{margin-left:2px;}
.inf-card-handle{font-size:.78rem;color:var(--text-muted);}
.inf-card-handle a{color:inherit;text-decoration:none;border-bottom:1px dashed var(--border);}
.inf-card-handle a:hover{color:var(--text);}
.inf-card-followers{margin-left:auto;font-size:.75rem;font-weight:700;color:var(--text);white-space:nowrap;}
.inf-card-desc{font-size:.82rem;color:var(--text-secondary);line-height:1.6;margin-bottom:8px;}
.inf-card-tags{display:flex;gap:4px;flex-wrap:wrap;}
.inf-card-tag{padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:600;background:var(--surface-hover);color:var(--text-muted);}
.inf-filter-row{max-width:960px;margin:24px auto 0;padding:0 24px;display:flex;gap:8px;flex-wrap:wrap;}

/* Mobile */
@media(max-width:640px){
  .site-header{padding:24px 16px 0;}
  .filters{padding:0 16px;}
  .section{padding:0 16px;}
  .acc-header{padding:12px 14px;flex-wrap:wrap;gap:6px;}
  .acc-tool{display:none;}
  .acc-separator{display:none;}
  .acc-tags{margin-left:0;}
  .acc-body-inner{padding:0 14px 16px;}
  .header-stats{gap:16px;}
  .tab-nav{padding:32px 16px 0;}
  .tab-btn{padding:10px 16px;font-size:.85rem;}
  .inf-platform-title{padding:0 16px;}
  .inf-grid{padding:0 16px 16px;grid-template-columns:1fr;}
  .inf-filter-row{padding:0 16px;}
}
</style>
</head>
<body>

<header class="site-header">
  <h1>AI導入事例 & インフルエンサー集</h1>
  <p>ChatGPT・Claude・Gemini の実践事例と、注目すべきAIインフルエンサー</p>
  <div class="header-stats">

</header>

<nav class="tab-nav">

</nav>

  <button class="filter-btn" data-inf-filter="youtube" onclick="filterInf('youtube',this)">YouTube</button>
  <button class="filter-btn" data-inf-filter="instagram" onclick="filterInf('instagram',this)">Instagram</button>
  <button class="filter-btn" data-inf-filter="threads" onclick="filterInf('threads',this)">Threads</button>
</div>
<div class="inf-filter-row" style="margin-top:8px">
  <span class="filter-label">地域:</span>
  <button class="filter-btn active" data-inf-region="all" onclick="filterInfRegion('all',this)">すべて</button>
  <button class="filter-btn" data-inf-region="jp" onclick="filterInfRegion('jp',this)">日本 🇯🇵</button>
  <button class="filter-btn" data-inf-region="global" onclick="filterInfRegion('global',this)">海外</button>
</div>
<div id="influencer-list"></div>

<script>
const CASES=[
// === ChatGPT x 開発 ===
{company:"Accenture",tool:"GitHub Copilot",provider:"chatgpt",genre:"dev",scale:"enterprise",highlight:"PR数8.69%増・ビルド成功率84%増",bg:"世界最大のITコンサルティング企業が、AIコーディングツールの効果を科学的に証明するため、ランダム化比較試験（RCT）という厳密な手法を採用した先駆的事例。Copilotなしのグループと比較することで、「本当にAIは開発生産性を上げるのか」に定量的な回答を出した。",method:"全社の開発者から450名をランダムに選出し、Copilot使用群と非使用群に分けて3ヶ月間の開発パフォーマンスを追跡。プルリクエスト数、マージ率、ビルド成功率、タスク完了数など複数のKPIで多角的に評価した。",results:["PR数 8.69%増","マージ率 11%向上","ビルド成功率 84%増","タスク完了 26%増"],flag:"",src:"https://github.blog/news-insights/research/research-quantifying-github-copilots-impact-in-the-enterprise-with-accenture/"},
{company:"Moderna",tool:"ChatGPT Enterprise",provider:"chatgpt",genre:"dev",scale:"enterprise",highlight:"750カスタムGPT・分析数週間→数時間",bg:"COVID-19ワクチンで知られるバイオテック企業が、製薬業界における規制文書作成や臨床データ分析の膨大な事務作業をAIで効率化。OpenAIと戦略的パートナーシップを締結し、全社的なAI活用を推進した。",method:"社内で750以上の用途特化型カスタムGPTを構築。「Dose ID GPT」はワクチンの最適投与量を迅速に評価し、「TPP GPT」は新薬のターゲット製品プロファイルを数時間でドラフト作成。法務・エンジニアリング・臨床チームがそれぞれ業務特化のGPTを自主開発した。",results:["750以上のカスタムGPT構築","分析工程を数週間から数時間に短縮","部門横断での自主的AI活用"],flag:"",src:"https://openai.com/index/moderna/"},
{company:"OpenAI（自社Codex）",tool:"Codexエージェント",provider:"chatgpt",genre:"dev",scale:"enterprise",highlight:"3名で100万行・コード90%以上AI生成",bg:"OpenAI自身が「Codexエージェントによる開発」を社内で実践した事例。人間がアーキテクチャ設計とレビューに専念し、コーディング自体をエージェントに委ねる「エージェントファースト」の開発手法を検証した。",method:"3名のエンジニアがCodexエージェントに並列でタスクを割り当て、アプリケーションロジック・テストコード・CI設定・ドキュメント・内部ツールの全コードをエージェントに生成させた。エンジニアは設計指示とコードレビュー、マージ判断に集中する分業体制を構築。",results:["3名で100万行のコード出荷","コードの90%以上がエージェント生成"],flag:"",src:"https://openai.com/index/harness-engineering/"},
{company:"Shopify",tool:"GitHub Copilot",provider:"chatgpt",genre:"dev",scale:"enterprise",highlight:"開発者90%以上採用・日次24,000行以上",bg:"ECプラットフォーム大手のShopifyが、CEO Tobi Lütkeの「AIの利用はもはや任意ではない」という全社メモを発端に、開発組織全体でAIコーディングを標準化。経営トップのコミットメントがボトムアップの採用を加速させた。",method:"全開発チームにCopilotを配布し、AIの活用度合いをパフォーマンス評価にも組み込み、「AIを使わない理由」を問う文化に転換。結果として日次で24,000行以上のAI生成コードが受け入れられる体制が定着した。",results:["開発者の90%以上が採用","日次24,000行以上のAI生成コード受入"],flag:"",src:"https://github.blog/news-insights/company-news/github-copilot-in-2025/"},
{company:"BBVA",tool:"ChatGPT Enterprise",provider:"chatgpt",genre:"dev",scale:"enterprise",highlight:"80%が週2時間以上削減",bg:"スペイン最大手の銀行BBVAが、金融業界特有の厳格なコンプライアンス環境下でChatGPT Enterpriseの大規模展開を実現。セキュリティとガバナンスを確保しつつ、従業員の自発的なAI活用を促進するアプローチが特徴。",method:"3,000ライセンスを法務・マーケティング・財務・開発など部門横断で配布。IT部門がトップダウンでユースケースを指定するのではなく、従業員自身が2,900以上のカスタムGPTを自主的に作成。部門ごとの業務知識とAIを組み合わせたボトムアップの活用が生まれた。",results:["3,000ライセンス展開","2,900以上のカスタムGPT","80%が週2時間以上の時間削減"],flag:"",src:"https://openai.com/index/bbva/"},
{company:"ZoomInfo",tool:"GitHub Copilot",provider:"chatgpt",genre:"dev",scale:"enterprise",highlight:"受入率33%・満足度72%",bg:"B2Bデータプラットフォーム企業が、GitHub Copilotの導入効果をarXivに学術論文として発表した珍しい事例。企業内での大規模導入効果を客観的に測定し、公開知見として共有した。",method:"全社エンジニアリング組織にCopilotを導入し、コード提案の受入率・行ベースの受入率・開発者満足度を定量的に測定。コード行ベースで20%、提案ベースで33%の受入率を記録し、学術論文として研究知見を公開した。",results:["提案ベース受入率 33%","行ベース受入率 20%","開発者満足度 72%"],flag:"",src:"https://arxiv.org/abs/2501.13282"},
{company:"日立製作所",tool:"GitHub Copilot",provider:"chatgpt",genre:"dev",scale:"enterprise",highlight:"生産性10-20%向上・コード生成率99%",bg:"日本を代表する総合電機メーカーが、2023年5月に「Generative AIセンター」を設置し、社内30万人規模のデジタル基盤整備の一環としてGitHub Copilotを導入。自社開発フレームワーク「Justware OSS」との相乗効果を追求した。",method:"自社フレームワークJustware OSSのコード生成テンプレートとCopilotを組み合わせることで、フレームワーク準拠のコード生成率を78%から99%に引き上げた。コミュニティ活動を通じて社内に知見を蓄積し、ベストプラクティスを全社展開。",results:["生産性 10-20%向上（最大30%）","フレームワーク準拠コード生成率 78%→99%"],flag:"🇯🇵",src:"https://www.microsoft.com/ja-jp/customers/story/22781-hitachi-github"},

const chevronSVG='<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6l4 4 4-4"/></svg>';

function getCases(sec){
  return CASES.filter(c=>{
    if(sec.scale==="solo") return c.scale==="solo"&&c.genre===sec.genre;
    if(sec.provider&&sec.genre) return c.provider===sec.provider&&c.genre===sec.genre&&c.scale!=="solo";
    return false;
  });
}

function renderItem(c){
  const genreTag=c.genre==="dev"?'<span class="acc-tag dev">開発</span>':'<span class="acc-tag mkt">マーケ</span>';
  const scaleTag=c.scale==="solo"?'<span class="acc-tag solo">個人</span>':'';
  const flag=c.flag?` <span class="flag">${c.flag}</span>`:'';
  const resultsHTML=c.results.map(r=>`<li>${r}</li>`).join('');
  return `<div class="acc-item" data-provider="${c.provider}" data-genre="${c.genre}" data-scale="${c.scale}">
  <div class="acc-header" onclick="toggleAcc(this)">
    <span class="acc-company">${c.company}${flag}</span>
    <span class="acc-separator">—</span>
    <span class="acc-tool">${c.tool}</span>
    <span class="acc-highlight">${c.highlight}</span>
    <span class="acc-tags">${genreTag}${scaleTag}</span>
    <span class="acc-chevron">${chevronSVG}</span>
  </div>
  <div class="acc-body">
    <div class="acc-body-inner">
      <div class="detail-block"><div class="detail-label">背景</div><div class="detail-text">${c.bg}</div></div>
      <div class="detail-block"><div class="detail-label">導入方法</div><div class="detail-text">${c.method}</div></div>
      <div class="detail-block"><div class="detail-label">成果</div><ul class="detail-list">${resultsHTML}</ul></div>
      ${c.src?`<div class="detail-block"><div class="detail-label">出典</div><a class="detail-link" href="${c.src}" target="_blank" rel="noopener">${new URL(c.src).hostname.replace('www.','')} ↗</a></div>`:''}
    </div>
  </div>
</div>`;
}

function renderSections(){
  const container=document.getElementById('cases');
  let html='';
  SECTIONS.forEach(sec=>{
    const items=getCases(sec);
    if(!items.length)return;
    html+=`<div class="section" data-section-provider="${sec.provider||''}" data-section-genre="${sec.genre}" data-section-scale="${sec.scale||''}">
      <div class="section-title"><span class="dot" style="background:${sec.color}"></span>${sec.title}<span class="count">${items.length}件</span></div>
      <div class="accordion-list">${items.map(renderItem).join('')}</div>
    </div>`;
  });
  container.innerHTML=html;
}

function toggleAcc(header){
  const item=header.parentElement;
  const body=item.querySelector('.acc-body');
  if(item.classList.contains('open')){
    body.style.maxHeight='0';
    item.classList.remove('open');
  }else{
    item.classList.add('open');
    body.style.maxHeight=body.scrollHeight+'px';
  }
}

// Filtering
let activeFilters={provider:'all',genre:'all',scale:'all'};

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const group=btn.dataset.group;
    document.querySelectorAll(`.filter-btn[data-group="${group}"]`).forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if(btn.dataset.filter==='all'){
      activeFilters[group]='all';
    }else if(btn.dataset.provider){
      activeFilters.provider=btn.dataset.provider;
    }else if(btn.dataset.genre){
      activeFilters.genre=btn.dataset.genre;
    }else if(btn.dataset.scale){
      activeFilters.scale=btn.dataset.scale;
    }
    applyFilters();
  });
});

function applyFilters(){
  document.querySelectorAll('.section').forEach(sec=>{
    const sp=sec.dataset.sectionProvider;
    const sg=sec.dataset.sectionGenre;
    const ss=sec.dataset.sectionScale;
    let show=true;
    if(activeFilters.provider!=='all'){
      if(ss==='solo'){
        // solo sections: show if items match provider
      }else if(sp!==activeFilters.provider){
        show=false;
      }
    }
    if(activeFilters.genre!=='all'&&sg!==activeFilters.genre) show=false;
    if(activeFilters.scale==='solo'&&ss!=='solo') show=false;
    sec.style.display=show?'':'none';

    // Filter individual items in solo sections
    if(ss==='solo'&&show){
      sec.querySelectorAll('.acc-item').forEach(item=>{
        let itemShow=true;
        if(activeFilters.provider!=='all'&&item.dataset.provider!==activeFilters.provider) itemShow=false;
        item.dataset.hidden=itemShow?'false':'true';
      });
      // Hide section if no visible items
      const visibleItems=sec.querySelectorAll('.acc-item[data-hidden="false"]');
      if(!visibleItems.length) sec.style.display='none';
    }
  });
}

renderSections();

// === Tab switching ===
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

    items.forEach(i=>{

      const tagsHTML=i.tags.map(t=>`<span class="inf-card-tag">${t}</span>`).join('');

          <div class="inf-card-followers">${i.followers}</div>

        <div class="inf-card-desc">${i.desc}</div>
        <div class="inf-card-tags">${tagsHTML}</div>

    });

function filterInf(val,btn){
  infFilters.platform=val;
  document.querySelectorAll('[data-inf-filter]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderInfluencers();
}
function filterInfRegion(val,btn){
  infFilters.region=val;
  document.querySelectorAll('[data-inf-region]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderInfluencers();
}
